name: Build CV

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-cv
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile English CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_english.tex
          latexmk_use_xelatex: true

      - name: Compile Spanish CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_spanish.tex
          latexmk_use_xelatex: true

      - name: Compile Catalan CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_catalan.tex
          latexmk_use_xelatex: true

      - name: Upload PDFs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: |
            cv_english.pdf
            cv_spanish.pdf
            cv_catalan.pdf

      - name: Publish PDFs to rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest CV
          body: |
            Auto-generated from the latest commit on `main`.
            Rebuilt on every push.
          files: |
            cv_english.pdf
            cv_spanish.pdf
            cv_catalan.pdf
          prerelease: false
          make_latest: "true"

      - name: Trigger PersonalPortfolio redeploy
        env:
          PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$PORTFOLIO_DISPATCH_TOKEN" ]; then
            echo "PORTFOLIO_DISPATCH_TOKEN secret not set; skipping portfolio dispatch."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PORTFOLIO_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/cuberhaus/PersonalPortfolio/dispatches \
            -d '{"event_type":"cv-updated"}'
