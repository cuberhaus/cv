name: Build CV

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Default: read-only. The publish job escalates to contents: write.
permissions:
  contents: read

concurrency:
  group: build-cv-${{ github.ref }}
  # Cancel superseded builds on develop/PRs, but let main publishes
  # finish so we never leave a half-released state on the repo.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the other languages if one fails — we want to see
      # all broken languages in a single run, not one at a time.
      fail-fast: false
      matrix:
        cv: [english, spanish, catalan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile ${{ matrix.cv }} CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv_${{ matrix.cv }}.tex
          latexmk_use_xelatex: true

      - name: Upload ${{ matrix.cv }} PDF
        uses: actions/upload-artifact@v4
        with:
          name: cv-${{ matrix.cv }}
          path: cv_${{ matrix.cv }}.pdf

  publish:
    # Releases + portfolio dispatch only on merges to main (PR from develop).
    # Pushes to develop and PR events only run `build` above for validation.
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all CV PDFs
        uses: actions/download-artifact@v4
        with:
          pattern: cv-*
          merge-multiple: true

      - name: Compute release tag
        id: tag
        run: |
          # Date-based tag: v2026.04.24-<shortsha>. Unique per commit so
          # each build gets its own permanent, archived release.
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y.%m.%d')
          TAG="v${DATE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Publish PDFs to dated release (archive)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: CV ${{ steps.tag.outputs.date }} (${{ steps.tag.outputs.short_sha }})
          body: |
            CV built from commit `${{ github.sha }}` on ${{ steps.tag.outputs.date }}.

            - `cv_english.pdf`
            - `cv_spanish.pdf`
            - `cv_catalan.pdf`
          files: |
            cv_english.pdf
            cv_spanish.pdf
            cv_catalan.pdf
          prerelease: false
          make_latest: "false"

      - name: Delete previous "latest" tag/release so it retags this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # softprops/action-gh-release updates assets on an existing release
          # but does NOT move the underlying git tag. Without this step, the
          # `latest` release page would forever show the commit where the tag
          # was first created. Deleting the release + tag first forces it to
          # be re-created against the current ${{ github.sha }}.
          gh release delete latest --yes --cleanup-tag || true

      - name: Publish PDFs to rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest CV
          body: |
            Auto-generated from the latest commit on `main`.
            Rebuilt on every push. For permanent archived versions see the
            dated releases (`v<YYYY.MM.DD>-<sha>`).

            Built from commit `${{ github.sha }}` on ${{ steps.tag.outputs.date }}.
          files: |
            cv_english.pdf
            cv_spanish.pdf
            cv_catalan.pdf
          prerelease: false
          make_latest: "true"

      - name: Trigger PersonalPortfolio redeploy
        env:
          PORTFOLIO_DISPATCH_TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$PORTFOLIO_DISPATCH_TOKEN" ]; then
            echo "PORTFOLIO_DISPATCH_TOKEN secret not set; skipping portfolio dispatch."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PORTFOLIO_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/cuberhaus/PersonalPortfolio/dispatches \
            -d '{"event_type":"cv-updated"}'
